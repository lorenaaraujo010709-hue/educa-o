<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_verse - Login & Cadastro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Manrope", sans-serif;
        }

        body {
            background-color: #000;
            background-image: radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.1) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Container Principal com Efeito Glassmorphism */
        .auth-container {
            width: 100%;
            max-width: 450px;
            background: rgba(8, 10, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Topo da Autenticação (Logo e Abas) */
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }

        .auth-logo span {
            color: #00f2fe;
            font-weight: 400;
        }

        /* Abas Alternadoras (Entrar / Cadastrar) */
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00f2fe, #7000ff);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }

        /* Formulários */
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .auth-form.active {
            display: flex;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
            background: rgba(255, 255, 255, 0.04);
        }

        /* Opções do Form */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
        }

        .remember-me input {
            accent-color: #00f2fe;
        }

        .forgot-link {
            color: #00f2fe;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #7000ff;
        }

        /* Botões */
        .btn-submit {
            background: linear-gradient(135deg, #00f2fe, #7000ff);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 10px 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .btn-guest {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .btn-guest:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        }

        .termos {
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 20px;
            line-height: 1.5;
        }

        .termos a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-weight: 600;
        }
        
        .termos a:hover { color: #00f2fe; }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <div class="auth-header">
            <div class="auth-logo">NEXUS<span>_verse</span></div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
                <button class="tab-btn" onclick="switchTab('cadastro')">Cadastrar</button>
            </div>
        </div>

        <form id="login-form" class="auth-form active" onsubmit="event.preventDefault();">
            <div class="input-group">
                <label for="login-email">E-mail ou Usuário</label>
                <input type="email" id="login-email" placeholder="seuemail@nexus.com" required>
            </div>
            
            <div class="input-group">
                <label for="login-password">Senha</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Lembrar de mim
                </label>
                <a href="#" class="forgot-link">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-submit">Entrar na Plataforma</button>
        </form>

        <form id="cadastro-form" class="auth-form" onsubmit="event.preventDefault();">
            <div class="input-group">
                <label for="cad-name">Nome Completo</label>
                <input type="text" id="cad-name" placeholder="Como quer ser chamado?" required>
            </div>

            <div class="input-group">
                <label for="cad-email">E-mail</label>
                <input type="email" id="cad-email" placeholder="seuemail@nexus.com" required>
            </div>
            
            <div class="input-group">
                <label for="cad-password">Senha</label>
                <input type="password" id="cad-password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="submit" class="btn-submit">Criar Minha Conta</button>
        </form>

        <div class="divider">ou</div>
        
        <a href="index.html" class="btn-guest">Começar Agora (Modo Convidado)</a>

        <div class="termos">
            Ao continuar, você concorda com os nossos <br>
            <a href="#">Termos de Serviço</a> e <a href="#">Política de Privacidade</a>.
        </div>

    </div>

    <script>
        function switchTab(type) {
            const loginForm = document.getElementById('login-form');
            const cadastroForm = document.getElementById('cadastro-form');
            const tabs = document.querySelectorAll('.tab-btn');

            if (type === 'login') {
                loginForm.classList.add('active');
                cadastroForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                cadastroForm.classList.add('active');
                loginForm.classList.remove('active');
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
            }
        }
    </script>
</body>
</html>
